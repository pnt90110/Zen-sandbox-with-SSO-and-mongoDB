<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Zen Sandbox</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="hud">
      <div class="brand">The Zen Sandbox</div>
      <div class="controls" id="materialControls"></div>
      <label class="slider-row">
        <span>Brush</span>
        <input id="brushSize" type="range" min="1" max="24" value="5" />
        <output id="brushSizeValue">5</output>
      </label>
      <label class="slider-row">
        <span>Gravity</span>
        <input id="simSpeed" type="range" min="1" max="4" value="2" />
        <output id="simSpeedValue">2</output>
      </label>
      <div class="font-size-buttons">
        <button id="fontSizeSmall" class="font-btn active">A</button>
        <button id="fontSizeMedium" class="font-btn">A+</button>
        <button id="fontSizeLarge" class="font-btn">A++</button>
      </div>
      <div class="button-row">
        <button id="clearBtn" class="ghost">Clear</button>
        <button id="muteBtn" class="ghost">🔊 Sound is On (s)</button>
      </div>
    </div>

    <canvas id="sandbox"></canvas>

    <div class="hint">
      1-8 select material • Left drag paint • Right drag erase • Space pause
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
